services:
  app:
    image: haventium_app:latest   # loaded via deploy.sh, not built here
    container_name: haventium_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - haventium_net
    # App is NOT exposed directly — Nginx proxies to it

  nginx:
    image: nginx:alpine
    container_name: haventium_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - haventium_net

  certbot:
    image: certbot/certbot
    container_name: haventium_certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  certbot_webroot:
  certbot_certs:

networks:
  haventium_net:
    driver: bridge
